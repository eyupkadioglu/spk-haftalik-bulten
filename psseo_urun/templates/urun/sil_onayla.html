{% extends 'base.html' %}
{% block title %}Ürün Sil — psSEO{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-0 shadow-sm border-danger">
      <div class="card-body text-center py-5">
        <i class="bi bi-trash3 text-danger fs-1"></i>
        <h5 class="mt-3">{{ urun.urun_kodu }} silinsin mi?</h5>
        <p class="text-muted">{{ urun.ad }}</p>
        <div class="d-flex gap-2 justify-content-center">
          <form method="POST">{% csrf_token %}
            <button class="btn btn-danger"><i class="bi bi-trash3 me-1"></i>Evet, Sil</button>
          </form>
          <a href="{% url 'urun:detay' urun.pk %}" class="btn btn-outline-secondary">İptal</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
