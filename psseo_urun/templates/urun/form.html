{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ baslik }} — psSEO{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-transparent fw-semibold py-2">
        <i class="bi bi-box-seam me-1 text-primary"></i>{{ baslik }}
      </div>
      <div class="card-body">
        <!-- URL'den otomatik doldur -->
        <div class="mb-3 p-3 bg-light rounded border">
          <label class="form-label fw-semibold small"><i class="bi bi-link-45deg me-1"></i>URL'den Otomatik Doldur</label>
          <div class="input-group">
            <input type="url" id="scrape-url" class="form-control form-control-sm" placeholder="https://www.tedarikci.com/urun/...">
            <button type="button" class="btn btn-outline-primary btn-sm" onclick="urldenDoldur()">
              <i class="bi bi-cloud-download me-1"></i>Çek
            </button>
          </div>
          <div id="scrape-durum" class="small text-muted mt-1"></div>
        </div>

        <form method="POST">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Kaydet</button>
            {% if urun %}
            <a href="{% url 'urun:detay' urun.pk %}" class="btn btn-outline-secondary">İptal</a>
            {% else %}
            <a href="{% url 'urun:liste' %}" class="btn btn-outline-secondary">İptal</a>
            {% endif %}
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function urldenDoldur() {
  const url = document.getElementById('scrape-url').value.trim();
  if (!url) { alert('URL girin.'); return; }
  document.getElementById('scrape-durum').textContent = 'Çekiliyor...';

  fetch('{% url "urun:scrape" %}', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'X-CSRFToken': getCookie('csrftoken'),
    },
    body: 'url=' + encodeURIComponent(url),
  })
  .then(r => r.json())
  .then(d => {
    if (d.hata) { document.getElementById('scrape-durum').textContent = 'Hata: ' + d.hata; return; }
    if (d.ad)              doldur('id_ad', d.ad);
    if (d.ham_aciklama)    doldur('id_ham_aciklama', d.ham_aciklama);
    if (d.teknik_ozellik)  doldur('id_teknik_ozellik', d.teknik_ozellik);
    doldur('id_kaynak_url', url);
    document.getElementById('scrape-durum').textContent = '✓ Bilgiler dolduruldu. Kontrol edip kaydedin.';
  })
  .catch(e => { document.getElementById('scrape-durum').textContent = 'Hata: ' + e; });
}

function doldur(id, deger) {
  const el = document.getElementById(id);
  if (el && !el.value) el.value = deger;
}

function getCookie(name) {
  const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
  return v ? v[2] : null;
}
</script>
{% endblock %}
