<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş — Ticaret ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .login-card { max-width: 400px; border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
    .login-header { background: linear-gradient(135deg, #0d6efd, #0a58ca); border-radius: 16px 16px 0 0; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="card login-card w-100 mx-3">
  <div class="login-header text-white text-center py-4 px-4">
    <i class="bi bi-shop-window fs-1"></i>
    <h4 class="mt-2 mb-0 fw-bold">Ticaret ERP</h4>
    <p class="small mb-0 opacity-75">Ticaret & Muhasebe Yönetimi</p>
  </div>
  <div class="card-body p-4">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Kullanıcı Adı veya E-posta</label>
        <div class="input-group">
          <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="admin" autofocus required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Şifre</label>
        <div class="input-group">
          <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" id="passwordInput" class="form-control" placeholder="••••••••" required>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePw()">
            <i class="bi bi-eye" id="pwEye"></i>
          </button>
        </div>
      </div>
      <div class="mb-4 d-flex align-items-center justify-content-between">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember" id="rememberMe">
          <label class="form-check-label small" for="rememberMe">Beni hatırla</label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Giriş Yap
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePw() {
  const inp = document.getElementById('passwordInput');
  const eye = document.getElementById('pwEye');
  if (inp.type === 'password') { inp.type = 'text'; eye.className = 'bi bi-eye-slash'; }
  else { inp.type = 'password'; eye.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
