{% extends 'base.html' %}
{% block title %}Virman{% endblock %}
{% block breadcrumb %}
<li class="breadcrumb-item"><a href="/">Ana Sayfa</a></li>
<li class="breadcrumb-item"><a href="{{ url_for('kasa.index') }}">Kasa</a></li>
<li class="breadcrumb-item active">Virman</li>
{% endblock %}

{% block content %}
<h4 class="mb-3 fw-bold"><i class="bi bi-arrow-left-right me-2 text-primary"></i>Virman</h4>
<div class="card border-0 shadow-sm" style="max-width:500px">
  <div class="card-body">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Kaynak Hesap *</label>
        <select name="kaynak_id" class="form-select" required>
          <option value="">— Seçin —</option>
          {% for k in kasalar %}<option value="{{ k.id }}">{{ k.ad }} ({{ k.bakiye | format_para }})</option>{% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Hedef Hesap *</label>
        <select name="hedef_id" class="form-select" required>
          <option value="">— Seçin —</option>
          {% for k in kasalar %}<option value="{{ k.id }}">{{ k.ad }}</option>{% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Tutar (₺) *</label>
        <input type="number" step="0.01" name="tutar" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Tarih *</label>
        <input type="text" name="tarih" class="form-control datepicker" value="{{ now().strftime('%d.%m.%Y') }}" required>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Virman Yap</button>
        <a href="{{ url_for('kasa.index') }}" class="btn btn-outline-secondary">İptal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
